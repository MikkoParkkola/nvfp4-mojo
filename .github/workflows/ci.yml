name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          pixi-version: v0.65.0
          manifest-path: mojoproject.toml

      - name: Show Mojo version
        run: pixi run --manifest-path mojoproject.toml mojo --version

      - name: Run test suite
        run: pixi run --manifest-path mojoproject.toml mojo run run_tests.mojo
