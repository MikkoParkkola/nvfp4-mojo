name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.65.0

      - name: Show Mojo version
        run: pixi run mojo --version

      - name: Run test suite
        run: pixi run mojo run run_tests.mojo
